server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 主页面 - 系统导航
    location = / {
        try_files $uri $uri/ /index.html;
    }

    # 智能问答系统
    location = /qa {
        alias /usr/share/nginx/html/服务区智能问答Demo.html;
        default_type text/html;
    }

    # 区长秘书系统
    location = /secretary {
        alias /usr/share/nginx/html/服务区区长秘书大模型Demo.html;
        default_type text/html;
    }

    # 绩效考核系统
    location = /performance {
        alias /usr/share/nginx/html/服务区绩效考核大模型Demo.html;
        default_type text/html;
    }

    # 预警指挥调度系统
    location = /warning {
        alias /usr/share/nginx/html/服务区预警指挥调度Demo.html;
        default_type text/html;
    }

    # 静态文件访问
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 健康检查
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}